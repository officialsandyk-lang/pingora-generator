name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    env:
      ENABLE_LANGCHAIN_UPDATE_AGENT: "false"
      LANGSMITH_TRACING: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest python-dotenv requests langsmith langchain langchain-openai openai
          fi

      - name: Run tests
        run: pytest -q
